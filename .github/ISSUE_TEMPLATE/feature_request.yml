name: Feature request
description: Suggest an improvement for Slovo.
title: "Feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Slovo do?
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy or security impact
      description: Does this change what leaves the machine, how secrets are stored, or which macOS permissions are needed?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
