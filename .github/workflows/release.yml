name: Release

# CI-native release automation. Every push to `main` runs this one pipeline, which
# itself decides — from the conventional commits since the last release tag —
# whether a release is due:
#
#   * releasable commits (feat / fix / perf / breaking) -> compute the next semver
#     with release-it, stamp it into Info.plist, build, sign, notarize, staple,
#     verify, then commit the version bump, tag `v<version>`, and publish a GitHub
#     Release with the stapled DMG and app zip.
#   * nothing releasable (docs / chore / ci only) -> the run is trunk verification:
#     it still tests and packages a signed artifact under a unique dev stamp, but
#     creates no tag and no release.
#
# Humans never run release commands, edit versions, or push tags — the pipeline is
# the only path. The publish job pushes the bump commit and tag with GITHUB_TOKEN,
# whose pushes deliberately do NOT re-trigger workflows (GitHub loop protection);
# together with `[skip ci]` this is why the release completes in a single run and
# needs no PAT. There is no standalone `tags: v*` trigger: tags are created by this
# pipeline, so a second, tag-triggered packaging run can never double-fire.
#
# Never runs on pull_request: fork PRs get no secrets, and packaging must never be
# exposed to untrusted code. Signing secrets live in the protected `release`
# environment and are reachable only from the packaging job.
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Least privilege by default; only the publish job is granted contents: write, and
# it holds no signing secrets.
permissions:
  contents: read

concurrency:
  # Do not cancel a release once it starts mutating state. A newer push to main may
  # still supersede an in-flight run during its `test` phase (the reusable gate has
  # its own cancel-in-progress group), but that is before any commit/tag/release, so
  # no partial publish can result. Queued runs re-decide against the tag the prior
  # run created.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Single source of the test gate: the reusable workflow that also guards PRs.
  test:
    uses: ./.github/workflows/swift.yml

  # Decide whether a release is due and, if so, compute the next version. Holds no
  # secrets and only reads the checkout, so it runs on the cheaper Linux runner.
  decide:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      releasable: ${{ steps.guard.outputs.releasable }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history and tags: the guard needs the range since the last v* tag,
          # and release-it reads that tag as the version anchor.
          fetch-depth: 0
      - name: Decide whether a release is due
        id: guard
        run: Scripts/release-decision.sh
      - name: Set up Node
        if: steps.guard.outputs.releasable == 'true'
        uses: actions/setup-node@v7
        with:
          node-version: "24"
      - name: Install release tooling
        if: steps.guard.outputs.releasable == 'true'
        # --ignore-scripts: release-it and the changelog plugin are pure JS and need
        # no lifecycle scripts, so no transitive dependency runs install-time code.
        run: npm ci --ignore-scripts
      - name: Compute the next release version
        id: version
        if: steps.guard.outputs.releasable == 'true'
        run: |
          set -euo pipefail
          version="$(npx --no-install release-it --release-version --ci)"
          # Delimiter form so a value can never inject extra output keys.
          {
            echo "version<<RELEASE_IT_VERSION_EOF"
            echo "$version"
            echo "RELEASE_IT_VERSION_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "computed release version: $version"

  package:
    needs: [ test, decide ]
    runs-on: macos-26
    # Signing secrets are scoped to this protected environment.
    environment: release
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so the CFBundleVersion build number (git rev-list --count)
          # is deterministic and monotonic.
          fetch-depth: 0
      - name: Stamp the app version
        env:
          RELEASABLE: ${{ needs.decide.outputs.releasable }}
          RELEASE_VERSION: ${{ needs.decide.outputs.version }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          build_number="$(git rev-list --count HEAD)"
          if [ "$RELEASABLE" = "true" ]; then
            # Real release: the computed marketing version + a monotonic build number.
            Scripts/stamp-app-version.sh "$RELEASE_VERSION" "$build_number"
          else
            # Trunk verification: a unique, run-scoped dev stamp that never
            # masquerades as a released build (marked short version + run-number
            # CFBundleVersion). No tag or release is created for this artifact.
            current="$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" Resources/Info.plist)"
            Scripts/stamp-app-version.sh "${current}-ci.${RUN_NUMBER}" "$RUN_NUMBER"
          fi
      - name: Cache SwiftPM build
        uses: actions/cache@v6
        with:
          # Deliberately excludes .build/dist so a restored cache never carries a
          # stale signed bundle into a fresh packaging run.
          path: |
            .build/checkouts
            .build/repositories
            .build/artifacts
            .build/release
          key: ${{ runner.os }}-release-spm-${{ env.ImageVersion }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-release-spm-${{ env.ImageVersion }}-
      - name: Toolchain
        run: swift --version && xcodebuild -version
      - name: Import Developer ID signing certificate
        env:
          DEVELOPER_ID_APP_P12_BASE64: ${{ secrets.DEVELOPER_ID_APP_P12_BASE64 }}
          DEVELOPER_ID_APP_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_APP_P12_PASSWORD }}
        run: |
          set -euo pipefail
          keychain_path="$RUNNER_TEMP/slovo-signing.keychain-db"
          keychain_password="$(openssl rand -base64 24)"
          cert_path="$RUNNER_TEMP/developer_id_app.p12"
          printf '%s' "$DEVELOPER_ID_APP_P12_BASE64" | base64 --decode > "$cert_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$cert_path" -P "$DEVELOPER_ID_APP_P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$keychain_password" "$keychain_path" >/dev/null
          # The ephemeral keychain is the only one on the user search list for the
          # rest of the job, so codesign resolves the Developer ID identity from it.
          security list-keychains -d user -s "$keychain_path"
          rm -f "$cert_path"
      - name: Build, sign, notarize, and staple the app and DMG
        env:
          SIGNING_IDENTITY: "Developer ID Application: Alexander Kurganov (ZN8H5SF4R7)"
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          NOTARY_KEY_P8="$RUNNER_TEMP/asc_api_key.p8"
          export NOTARY_KEY_P8
          printf '%s' "$ASC_API_KEY_P8_BASE64" | base64 --decode > "$NOTARY_KEY_P8"
          Scripts/sign-and-notarize.sh app
          xcrun stapler staple .build/dist/Slovo.app
          Scripts/sign-and-notarize.sh dmg
          xcrun stapler staple .build/dist/Slovo.dmg
          # Release asset must contain the STAPLED app, so re-zip after stapling.
          ditto -c -k --keepParent .build/dist/Slovo.app .build/dist/Slovo.zip
          rm -f "$NOTARY_KEY_P8"
      - name: Verify signing, notarization, and stapling
        run: |
          set -euo pipefail
          app=".build/dist/Slovo.app"
          dmg=".build/dist/Slovo.dmg"
          codesign --verify --strict --deep --verbose=2 "$app"
          codesign --verify --verbose=2 "$dmg"
          info="$(codesign --display --verbose=4 "$app" 2>&1)"
          echo "$info"
          echo "$info" | grep -q "Identifier=com.slovo.app"
          echo "$info" | grep -q "TeamIdentifier=ZN8H5SF4R7"
          xcrun stapler validate "$app"
          xcrun stapler validate "$dmg"
          spctl --assess --type execute -vv "$app"
      - name: Generate the Sparkle appcast
        # Only a real release has a version for the version-pinned enclosure URL;
        # trunk-verification runs skip this (same releasable gate as version stamping).
        if: needs.decide.outputs.releasable == 'true'
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
          RELEASE_VERSION: ${{ needs.decide.outputs.version }}
        run: |
          set -euo pipefail
          # EdDSA private key via a temp file (same pattern as the notary .p8),
          # removed right after; it stays in this job and never reaches publish.
          ed_key_file="$RUNNER_TEMP/sparkle_ed_private_key"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$ed_key_file"
          # Feed generate_appcast a directory holding ONLY the release DMG, so the
          # sibling Slovo.zip is never treated as a second update archive.
          appcast_dir="$RUNNER_TEMP/appcast"
          mkdir -p "$appcast_dir"
          cp .build/dist/Slovo.dmg "$appcast_dir/"
          .build/artifacts/sparkle/Sparkle/bin/generate_appcast \
            --ed-key-file "$ed_key_file" \
            --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/v${RELEASE_VERSION}/" \
            "$appcast_dir"
          cp "$appcast_dir/appcast.xml" .build/dist/appcast.xml
          rm -f "$ed_key_file"
      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: slovo-macos
          # appcast.xml is present only on releasable runs; upload-artifact errors
          # only when the whole set is empty, so the dmg/zip keep trunk runs valid.
          path: |
            .build/dist/Slovo.dmg
            .build/dist/Slovo.zip
            .build/dist/appcast.xml
          if-no-files-found: error

  publish:
    needs: [ decide, package ]
    # Only a run that decided a release is due publishes. Write access is isolated
    # to this job, which holds no signing secrets (nor the EdDSA appcast key — it
    # only attaches the appcast.xml the package job already generated). It MUST run
    # on macOS: the
    # version stamp goes through the repo's single stamping script, which uses
    # Apple userland (PlistBuddy, plutil) so the committed plist can never drift
    # from the packaged one — a Linux runner has neither tool (exit 127).
    if: needs.decide.outputs.releasable == 'true'
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so the committed CFBundleVersion matches the packaged one
          # deterministically. persist-credentials (default) lets the GITHUB_TOKEN
          # push the bump commit and tag; those pushes do not re-trigger workflows.
          fetch-depth: 0
      - name: Download signed artifacts
        uses: actions/download-artifact@v4
        with:
          name: slovo-macos
          path: dist
      - name: Stamp the release version and cut the changelog
        env:
          RELEASE_VERSION: ${{ needs.decide.outputs.version }}
        run: |
          set -euo pipefail
          build_number="$(git rev-list --count HEAD)"
          Scripts/stamp-app-version.sh "$RELEASE_VERSION" "$build_number"
          Scripts/promote-changelog.sh "$RELEASE_VERSION" "$(date -u +%Y-%m-%d)"
      - name: Commit, tag, and push the release bump
        env:
          RELEASE_VERSION: ${{ needs.decide.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Resources/Info.plist CHANGELOG.md
          git commit -m "chore(release): v${RELEASE_VERSION} [skip ci]"
          git tag "v${RELEASE_VERSION}"
          # Push the commit first; if main advanced meanwhile this fails non-fast-
          # forward before any tag or release is created, leaving no partial state.
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "v${RELEASE_VERSION}"
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.decide.outputs.version }}
        run: |
          set -euo pipefail
          gh release create "v${RELEASE_VERSION}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "v${RELEASE_VERSION}" \
            --generate-notes \
            --verify-tag \
            dist/Slovo.dmg dist/Slovo.zip dist/appcast.xml
