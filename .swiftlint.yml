included:
  - Package.swift
  - Sources
  - Tests
  - Tools

excluded:
  - .build
  - .swiftpm
  - Tests/GateChecksTests/Fixtures

strict: true
lenient: false
check_for_updates: false
allow_zero_lintable_files: false
reporter: xcode

# Policy: start from SwiftLint strict mode with all opt-in/analyzer rules, then
# disable rules that create high churn or conflict with the repo's existing
# Swift/API style. Re-enable a disabled rule only with a focused cleanup pass.
disabled_rules:
  # Formatting/layout preferences with low bug-prevention value for this repo.
  - anonymous_argument_in_multiline_closure
  - contrasted_opening_brace
  - conditional_returns_on_newline
  - indentation_width
  - let_var_whitespace
  - multiline_arguments
  - multiline_arguments_brackets
  - multiline_call_arguments
  - multiline_function_chains
  - sorted_enum_cases
  - sorted_imports
  - switch_case_on_newline
  - trailing_closure
  - trailing_comma
  - type_contents_order
  - vertical_whitespace_between_cases
  - vertical_whitespace_opening_braces

  # Explicitness/documentation rules that would require a broad, non-behavioral
  # rewrite before they become useful prevention gates.
  - explicit_acl
  - explicit_enum_raw_value
  - explicit_self
  - explicit_top_level_acl
  - explicit_type_interface
  - file_name
  - file_types_order
  - missing_docs
  - one_declaration_per_file
  - required_deinit
  - strict_fileprivate

  # Style rules where the current project conventions are clearer than the
  # blanket rule.
  - async_without_await
  - discouraged_default_parameter
  - discouraged_optional_collection
  - force_unwrapping
  - function_default_parameter_at_end
  - inclusive_language
  - incompatible_concurrency_annotation
  - large_tuple
  - nesting
  - no_extension_access_modifier
  - no_empty_block
  - no_grouping_extension
  - no_magic_numbers
  - non_overridable_class_declaration
  - optional_data_string_conversion
  - pattern_matching_keywords
  - prefer_condition_list
  - prefer_self_in_static_references
  - prefixed_toplevel_constant
  - redundant_self
  - static_over_final_class
  - unneeded_throws_rethrows
  - unused_enumerated
  - unused_parameter
  - variable_shadowing

  # Analyzer noise in this package today; enforce it through a focused cleanup
  # task rather than blocking unrelated feature work.
  - unused_import

opt_in_rules:
  - all

analyzer_rules:
  - all

cyclomatic_complexity:
  warning: 20
  error: 30

function_body_length:
  warning: 80
  error: 120

identifier_name:
  excluded:
    - ac
    - c
    - db
    - e
    - en
    - i
    - id
    - op
    - p5
    - p7
    - p9
    - ru
    - t
    - t1
    - t2
    - t3
    - up

line_length:
  warning: 160
  error: 220

type_body_length:
  warning: 400
  error: 600
